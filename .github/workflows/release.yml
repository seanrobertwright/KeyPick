name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build bundle and create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ts
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: ts
        run: bun run typecheck

      - name: Verify package version matches tag
        working-directory: ts
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build bundle
        working-directory: ts
        run: bun run build

      - name: Package release artifacts
        working-directory: ts
        run: |
          OUT="keypick-${GITHUB_REF_NAME}"
          mkdir -p "dist-pkg/$OUT"
          cp dist/keypick.js "dist-pkg/$OUT/"
          cp package.json "dist-pkg/$OUT/"
          cp ../LICENSE "dist-pkg/$OUT/"
          cp ../README.md "dist-pkg/$OUT/"
          cd dist-pkg
          tar czf "${OUT}.tar.gz" "$OUT"
          zip -qr "${OUT}.zip" "$OUT"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ts/dist-pkg/keypick-*.*
          generate_release_notes: true
          body: |
            ## Install

            Requires [Bun](https://bun.sh).

            **macOS / Linux / WSL:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/master/install.ps1 | iex
            ```
